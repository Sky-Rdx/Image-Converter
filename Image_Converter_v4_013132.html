<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Converter</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
body{font-family:Arial;background:#f2f2f2;margin:0;}

.container{width:100%;max-width:900px;margin:auto;padding:15px;}

@media(min-width:900px){.container{padding-left:25px;padding-right:25px;}}
@media(max-width:600px){.drop{margin-left:10px;margin-right:10px;}}

h1{text-align:center;}

.select-row{display:flex;justify-content:center;align-items:center;gap:10px;position:relative;}

.arrow{width:20px;height:20px;}

.drop{border:2px dashed #aaa;padding:30px;text-align:center;border-radius:12px;margin:15px 0;cursor:pointer;}

.buttons{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;}

.btn{padding:12px 20px;border:none;border-radius:25px;background:linear-gradient(45deg,#5a6cff,#7b8cff);color:white;display:flex;align-items:center;gap:6px;cursor:pointer;}

.file{display:flex;align-items:center;justify-content:space-between;background:white;padding:10px;margin:10px 0;border-radius:12px;gap:10px;}

.file-thumb{width:55px;height:55px;border-radius:8px;object-fit:cover;cursor:pointer;transition:transform 0.15s, box-shadow 0.15s;flex-shrink:0;}
.file-thumb:hover{transform:scale(1.07);box-shadow:0 4px 16px rgba(0,0,0,0.18);}

.info{flex:1;min-width:0;}

.filename{font-weight:bold;font-size:15px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}

.size-text{font-size:12px;color:#444;margin-top:2px;}

.download-btn{border:2px solid #ccc;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;width:40px;height:40px;cursor:pointer;background:white;}
.download-btn svg{width:18px;height:18px;}
.download-btn:hover{background:#5a6cff;}
.download-btn:hover svg{stroke:white;}

@media(min-width:768px){
  .download-btn{width:55px;height:55px;}
  .download-btn svg{width:24px;height:24px;}
  .btn{padding:14px 30px;font-size:16px;}
}

@media(min-width:900px){
  .file-thumb{width:80px;height:80px;}
  .filename{font-size:18px;}
  .size-text{font-size:13px;}
  .file{padding:15px;gap:15px;}
}

/* Convert button states */
.convert-btn{display:block;margin:20px auto;padding:14px 40px;border:none;border-radius:30px;font-size:18px;background:linear-gradient(45deg,#5a6cff,#7b8cff);color:white;width:90%;max-width:400px;cursor:pointer;transition:background 0.2s, opacity 0.2s;}
.convert-btn.active{background:lightgreen;color:black;}
.convert-btn.blocked{background:#ccc;color:#888;cursor:not-allowed;opacity:0.7;}

/* ── CUSTOM FORMAT PICKER ── */
#from,#to{display:none;}

.fmt-wrapper{position:relative;display:inline-block;}

.fmt-pill{display:inline-flex;align-items:center;justify-content:center;min-width:80px;padding:10px 20px;border-radius:50px;background:#e8e8e8;border:none;font-size:16px;font-weight:600;cursor:pointer;user-select:none;letter-spacing:0.5px;color:#111;transition:background 0.2s;}
.fmt-pill:active{opacity:0.85;}
.fmt-pill.mismatch{background:#ffe0e0;color:#c0392b;}

.fmt-dropdown{display:none;position:absolute;top:calc(100% + 6px);left:0;background:#fff;border-radius:14px;box-shadow:0 6px 24px rgba(0,0,0,0.18);overflow:hidden;z-index:999;min-width:110px;}
.fmt-dropdown.open{display:block;}

.fmt-option{padding:14px 22px;font-size:16px;font-weight:600;cursor:pointer;background:#fff;color:#111;letter-spacing:0.5px;}
.fmt-option:hover{background:#f0f0f0;}
.fmt-option.selected{background:#5a6cff;color:#fff;}

/* ── POPUP NOTIFICATION ── */
#popup-container{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;align-items:center;gap:10px;width:90%;max-width:420px;pointer-events:none;}

.popup{background:#fff;border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,0.18),0 2px 8px rgba(0,0,0,0.10);padding:16px 18px;display:flex;align-items:flex-start;gap:12px;width:100%;box-sizing:border-box;pointer-events:all;animation:popIn 0.25s ease;position:relative;overflow:hidden;}

@keyframes popIn{from{opacity:0;transform:translateY(-12px) scale(0.97);}to{opacity:1;transform:translateY(0) scale(1);}}
.popup.fade-out{animation:popOut 0.3s ease forwards;}
@keyframes popOut{from{opacity:1;transform:translateY(0) scale(1);}to{opacity:0;transform:translateY(-10px) scale(0.97);}}

.popup-icon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.popup-icon.warn{background:#fff4e0;}
.popup-icon.error{background:#ffeaea;}
.popup-icon.fix{background:#e8f0ff;}

.popup-body{flex:1;min-width:0;}
.popup-title{font-weight:700;font-size:14px;margin-bottom:3px;color:#111;}
.popup-msg{font-size:13px;color:#555;line-height:1.45;}

.popup-fix-btn{display:inline-block;margin-top:8px;padding:6px 14px;background:#5a6cff;color:#fff;border:none;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;}
.popup-fix-btn:hover{background:#3a4cdf;}

.popup-close{background:none;border:none;cursor:pointer;color:#aaa;line-height:1;padding:4px;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;border-radius:50%;}
.popup-close:hover{color:#555;background:#f0f0f0;}

.popup-bar{height:3px;background:#5a6cff22;border-radius:0 0 16px 16px;position:absolute;bottom:0;left:0;right:0;overflow:hidden;}
.popup-bar-fill{height:100%;background:#5a6cff;width:100%;transition:width linear;}

/* ── IMAGE PREVIEW LIGHTBOX ── */
#lightbox{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:10000;display:flex;align-items:center;justify-content:center;padding:20px;box-sizing:border-box;opacity:0;pointer-events:none;transition:opacity 0.2s;}
#lightbox.open{opacity:1;pointer-events:all;}

#lightbox-inner{background:#fff;border-radius:18px;box-shadow:0 16px 60px rgba(0,0,0,0.4);max-width:92vw;max-height:88vh;display:flex;flex-direction:column;overflow:hidden;transform:scale(0.93);transition:transform 0.2s;}
#lightbox.open #lightbox-inner{transform:scale(1);}

#lightbox-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid #eee;gap:10px;}
#lightbox-title{font-size:13px;font-weight:600;color:#333;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;}
#lightbox-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;flex-shrink:0;}
#lightbox-badge.original{background:#e8f0ff;color:#3a5cdf;}
#lightbox-badge.converted{background:#e6f9f0;color:#1a8a4a;}
#lightbox-close{background:none;border:none;font-size:22px;cursor:pointer;color:#aaa;line-height:1;padding:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;border-radius:50%;}
#lightbox-close:hover{color:#333;}

#lightbox-img{max-width:100%;max-height:calc(88vh - 60px);object-fit:contain;display:block;}
</style>
</head>
<body>

<div id="popup-container"></div>

<!-- Lightbox -->
<div id="lightbox" onclick="handleLightboxClick(event)">
  <div id="lightbox-inner">
    <div id="lightbox-header">
      <div id="lightbox-title"></div>
      <div id="lightbox-badge" class="original">ORIGINAL</div>
      <button id="lightbox-close" onclick="closeLightbox()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <img id="lightbox-img" src="" alt="Preview">
  </div>
</div>

<div class="container">
  <h1>Image Converter</h1>

  <div class="select-row">
    <select id="from">
      <option value="jpg">JPG</option>
      <option value="png">PNG</option>
      <option value="webp">WEBP</option>
    </select>
    <select id="to">
      <option value="webp">WEBP</option>
      <option value="jpg">JPG</option>
      <option value="png">PNG</option>
    </select>

    <div class="fmt-wrapper" id="fromWrapper">
      <div class="fmt-pill" id="fromPill" onclick="toggleDropdown('from')">JPG</div>
      <div class="fmt-dropdown" id="fromDropdown">
        <div class="fmt-option selected" data-value="jpg" onclick="selectFmt('from','jpg')">JPG</div>
        <div class="fmt-option" data-value="png" onclick="selectFmt('from','png')">PNG</div>
        <div class="fmt-option" data-value="webp" onclick="selectFmt('from','webp')">WEBP</div>
      </div>
    </div>

    <svg class="arrow" viewBox="0 0 24 24" stroke="black" fill="none" stroke-width="2">
      <path d="M5 12h14"/><path d="M13 6l6 6-6 6"/>
    </svg>

    <div class="fmt-wrapper" id="toWrapper">
      <div class="fmt-pill" id="toPill" onclick="toggleDropdown('to')">WEBP</div>
      <div class="fmt-dropdown" id="toDropdown">
        <div class="fmt-option" data-value="jpg" onclick="selectFmt('to','jpg')">JPG</div>
        <div class="fmt-option" data-value="png" onclick="selectFmt('to','png')">PNG</div>
        <div class="fmt-option selected" data-value="webp" onclick="selectFmt('to','webp')">WEBP</div>
      </div>
    </div>
  </div>

  <div class="drop" id="drop">Click or Drag & Drop Images Here</div>

  <div class="buttons">
    <button class="btn" onclick="input.click()">+ Add More</button>
    <button class="btn" onclick="downloadAll()">
      <svg width="18" height="18" viewBox="0 0 24 24" stroke="white" fill="none" stroke-width="2">
        <path d="M12 3v12"/><path d="M7 10l5 5 5-5"/><path d="M4 19h16"/>
      </svg>
      Download All
    </button>
  </div>

  <input type="file" id="input" multiple hidden>
  <div id="list"></div>

  <div style="text-align:center;">
    Quality: <span id="qVal">90</span>%
    <input type="range" id="quality" value="90">
  </div>

  <button id="convertBtn" class="convert-btn" onclick="convertAll()">Convert All</button>
</div>

<script>
let files = [];
const SUPPORTED = ['jpg','png','webp'];
let mismatchPopupEl = null; // track the active mismatch popup

const input      = document.getElementById("input");
const list       = document.getElementById("list");
const quality    = document.getElementById("quality");
const qVal       = document.getElementById("qVal");
const convertBtn = document.getElementById("convertBtn");
const from       = document.getElementById("from");
const to         = document.getElementById("to");

qVal.innerText = quality.value;
quality.oninput = () => qVal.innerText = quality.value;

/* ── FORMAT DETECTION ── */
function getFileFormat(file){
  const mime = (file.type||'').toLowerCase();
  if(mime==='image/jpeg'||mime==='image/jpg') return 'jpg';
  if(mime==='image/png')  return 'png';
  if(mime==='image/webp') return 'webp';
  const ext = file.name.split('.').pop().toLowerCase();
  if(ext==='jpg'||ext==='jpeg') return 'jpg';
  if(ext==='png')  return 'png';
  if(ext==='webp') return 'webp';
  return ext || 'unknown';
}

/* ── FORMAT MISMATCH CHECK ── */
function getLoadedImageFormat(){
  if(!files.length) return null;
  const fmt = files[0]._detectedFormat;
  return fmt;
}

function checkFormatMismatch(){
  if(!files.length) return false;
  const imgFmt = getLoadedImageFormat();
  const selFmt = from.value;
  return imgFmt && imgFmt !== selFmt;
}

function updateConvertBtn(){
  if(checkFormatMismatch()){
    convertBtn.classList.add('blocked');
    convertBtn.classList.remove('active');
  } else {
    convertBtn.classList.remove('blocked');
  }
}

/* ── POPUP SYSTEM ── */
const popupContainer = document.getElementById('popup-container');

function showPopup(type, title, message, duration=5000, fixCallback=null){
  const el = document.createElement('div');
  el.className = 'popup';

  const iconSvg = {
    error: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#e74c3c" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`,
    warn:  `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#f39c12" stroke-width="2.5"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`,
    fix:   `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#5a6cff" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`
  }[type] || '';

  const barId = 'bar-' + Date.now();
  const fixBtnHtml = fixCallback
    ? `<button class="popup-fix-btn" id="fixbtn-${barId}">Fix Format</button>`
    : '';

  el.innerHTML = `
    <div class="popup-icon ${type}">${iconSvg}</div>
    <div class="popup-body">
      <div class="popup-title">${title}</div>
      <div class="popup-msg">${message}</div>
      ${fixBtnHtml}
    </div>
    <button class="popup-close" onclick="dismissPopup(this.closest('.popup'))"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    <div class="popup-bar"><div class="popup-bar-fill" id="${barId}"></div></div>
  `;

  popupContainer.appendChild(el);

  if(fixCallback){
    document.getElementById('fixbtn-'+barId).onclick = ()=>{
      fixCallback();
      dismissPopup(el);
    };
  }

  if(duration != null && duration > 0){
    requestAnimationFrame(()=>{
      const bar = document.getElementById(barId);
      if(bar){ bar.style.transition=`width ${duration}ms linear`; bar.style.width='0%'; }
    });
    const timer = setTimeout(()=>dismissPopup(el), duration);
    el._timer = timer;
  } else {
    // No auto-dismiss - hide progress bar
    requestAnimationFrame(()=>{
      const bar = document.getElementById(barId);
      if(bar && bar.parentNode) bar.parentNode.style.display='none';
    });
  }
  return el;
}

function dismissPopup(el){
  if(!el||!el.parentNode) return;
  clearTimeout(el._timer);
  el.classList.add('fade-out');
  setTimeout(()=>{ if(el.parentNode) el.parentNode.removeChild(el); }, 300);
  if(el === mismatchPopupEl) mismatchPopupEl = null;
}

/* ── FORMAT DROPDOWN LOGIC ── */
function updateFormats(){
  const fromVal = from.value;

  [...to.options].forEach(o=>{ o.hidden=(o.value===fromVal); });
  if(from.value===to.value){
    for(let opt of to.options){
      if(!opt.hidden){ to.value=opt.value; break; }
    }
  }

  document.querySelectorAll('#toDropdown .fmt-option').forEach(opt=>{
    opt.style.display=(opt.dataset.value===from.value)?'none':'';
  });

  const toDropVisible=[...document.querySelectorAll('#toDropdown .fmt-option')].filter(o=>o.style.display!=='none');
  const currentToSelected=document.querySelector('#toDropdown .fmt-option.selected');
  if(currentToSelected&&currentToSelected.style.display==='none'){
    if(toDropVisible.length) selectFmt('to',toDropVisible[0].dataset.value,true);
  }

  // Check mismatch after format change
  checkAndShowMismatchPopup();
  updateConvertBtn();
}

function checkAndShowMismatchPopup(){
  const pill = document.getElementById('fromPill');
  if(checkFormatMismatch()){
    pill.classList.add('mismatch');
    // Only show popup if not already showing one
    if(!mismatchPopupEl || !mismatchPopupEl.parentNode){
      const imgFmt = getLoadedImageFormat();
      mismatchPopupEl = showPopup(
        'fix',
        'Wrong Image Format Selected',
        `Your images are <b>${imgFmt.toUpperCase()}</b> but the "From" format is set to <b>${from.value.toUpperCase()}</b>. Fix it to enable conversion.`,
        null, // null = stays until format is corrected or dismissed manually
        ()=>{ selectFmt('from', imgFmt, false); }
      );
    }
  } else {
    pill.classList.remove('mismatch');
    if(mismatchPopupEl && mismatchPopupEl.parentNode){
      dismissPopup(mismatchPopupEl);
      mismatchPopupEl = null;
    }
  }
}

from.onchange = updateFormats;
to.onchange   = updateFormats;
updateFormats();

function toggleDropdown(which){
  const dd=document.getElementById(which+'Dropdown');
  const isOpen=dd.classList.contains('open');
  document.querySelectorAll('.fmt-dropdown').forEach(d=>d.classList.remove('open'));
  if(!isOpen) dd.classList.add('open');
}

function selectFmt(which, val, silent){
  const pill=document.getElementById(which+'Pill');
  const dd=document.getElementById(which+'Dropdown');
  pill.textContent=val.toUpperCase();
  dd.querySelectorAll('.fmt-option').forEach(o=>o.classList.toggle('selected',o.dataset.value===val));
  document.getElementById(which).value=val;
  dd.classList.remove('open');
  if(!silent) updateFormats();
}

document.addEventListener('click',e=>{
  if(!e.target.closest('.fmt-wrapper')) document.querySelectorAll('.fmt-dropdown').forEach(d=>d.classList.remove('open'));
});

/* ── IMAGE LIGHTBOX ── */
const lightbox     = document.getElementById('lightbox');
const lightboxImg  = document.getElementById('lightbox-img');
const lightboxTitle= document.getElementById('lightbox-title');
const lightboxBadge= document.getElementById('lightbox-badge');

function openLightbox(file){
  // Show converted blob if available, else original
  if(file.blob){
    lightboxImg.src = URL.createObjectURL(file.blob);
    lightboxBadge.textContent = 'CONVERTED';
    lightboxBadge.className = 'converted';
  } else {
    lightboxImg.src = URL.createObjectURL(file);
    lightboxBadge.textContent = 'ORIGINAL';
    lightboxBadge.className = 'original';
  }
  lightboxTitle.textContent = file.name;
  lightbox.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeLightbox(){
  lightbox.classList.remove('open');
  document.body.style.overflow = '';
  setTimeout(()=>{ lightboxImg.src=''; }, 250);
}

function handleLightboxClick(e){
  // Close if clicking the backdrop (not the inner card)
  if(e.target === lightbox) closeLightbox();
}

document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeLightbox(); });

/* ── DRAG & DROP ── */
const drop=document.getElementById("drop");
drop.onclick=()=>input.click();
drop.ondragover=e=>{ e.preventDefault(); drop.style.background="#ddd"; };
drop.ondragleave=()=>{ drop.style.background=""; };
drop.ondrop=e=>{ e.preventDefault(); drop.style.background=""; addFiles(e.dataTransfer.files); };
input.onchange=()=>addFiles(input.files);

/* ── ADD FILES ── */
function addFiles(f){
  const newFiles=Array.from(f);
  if(!newFiles.length) return;

  const unsupported=[], supported=[];

  newFiles.forEach(file=>{
    const fmt=getFileFormat(file);
    file._detectedFormat=fmt;
    if(!SUPPORTED.includes(fmt)) unsupported.push({file,fmt});
    else { file.converted=false; supported.push({file,fmt}); }
  });

  if(unsupported.length){
    const names=unsupported.map(u=>`<b>${u.file.name}</b> (.${u.fmt})`).join('<br>');
    showPopup('error','Format Not Supported',
      `The following ${unsupported.length>1?'files are':'file is'} not supported and will be skipped:<br>${names}<br><br>Supported: JPG, PNG, WEBP`,7000);
  }

  if(!supported.length) return;

  const fmtCounts={};
  supported.forEach(({fmt})=>{ fmtCounts[fmt]=(fmtCounts[fmt]||0)+1; });
  const dominantFmt=Object.entries(fmtCounts).sort((a,b)=>b[1]-a[1])[0][0];
  const allSameFmt=Object.keys(fmtCounts).length===1;

  const currentFrom=from.value;
  if(allSameFmt){
    if(dominantFmt!==currentFrom) selectFmt('from',dominantFmt,false);
  } else {
    const fmtList=Object.keys(fmtCounts).map(f=>f.toUpperCase()).join(' & ');
    showPopup('warn','Mixed Image Formats Detected',
      `Images with different formats (${fmtList}) detected. "From" set to <b>${dominantFmt.toUpperCase()}</b> (most common).`,6000);
    if(dominantFmt!==currentFrom) selectFmt('from',dominantFmt,false);
  }

  supported.forEach(({file})=>files.push(file));
  render();
  updateConvertBtn();
}

/* ── RENDER ── */
function render(){
  list.innerHTML="";

  files.forEach(f=>{
    let div=document.createElement("div");
    div.className="file";

    // Clickable thumbnail
    let img=document.createElement("img");
    img.className="file-thumb";
    img.src=URL.createObjectURL(f);
    img.title="Click to preview";
    img.onclick=()=>openLightbox(f);

    let info=document.createElement("div");
    info.className="info";

    let html=`<div class="filename">${f.name}</div>`;
    if(f.converted){
      let color=f.newSize<f.size?"green":"orange";
      html+=`<div class="size-text" style="display:flex;align-items:center;gap:6px;">
        ${(f.size/1024).toFixed(2)} KB
        <svg width="14" height="14" viewBox="0 0 24 24" stroke="black" fill="none" stroke-width="2"><path d="M5 12h14"/><path d="M13 6l6 6-6 6"/></svg>
        <span style="color:${color}">${(f.newSize/1024).toFixed(2)} KB</span>
      </div>`;
    } else {
      html+=`<div class="size-text">Ready</div>`;
    }
    info.innerHTML=html;

    let btn=document.createElement("div");
    btn.className="download-btn";
    btn.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2"><path d="M12 3v12"/><path d="M7 10l5 5 5-5"/><path d="M4 19h16"/></svg>`;
    btn.onclick=()=>{
      if(f.blob){
        let ext=document.getElementById("to").value;
        let a=document.createElement("a");
        a.href=URL.createObjectURL(f.blob);
        a.download=f.name.replace(/\.[^/.]+$/,"")+"."+ext;
        a.click();
      }
    };

    div.append(img,info,btn);
    list.appendChild(div);
  });
}

/* ── CONVERT ── */
async function convertAll(){
  if(checkFormatMismatch()){
    // Re-show mismatch popup if somehow dismissed
    if(!mismatchPopupEl||!mismatchPopupEl.parentNode) checkAndShowMismatchPopup();
    return;
  }

  convertBtn.classList.add("active");

  for(let f of files){
    if(!f.converted) await convert(f);
  }

  convertBtn.classList.remove("active");
  render();
}

function convert(file){
  return new Promise(res=>{
    let img=new Image();
    img.src=URL.createObjectURL(file);
    img.onload=()=>{
      let c=document.createElement("canvas");
      c.width=img.width; c.height=img.height;
      c.getContext("2d").drawImage(img,0,0);
      let format=document.getElementById("to").value;
      c.toBlob(b=>{
        file.blob=b;
        file.newSize=b.size;
        file.converted=true;
        res();
      },"image/"+format,quality.value/100);
    };
  });
}

/* ── ZIP DOWNLOAD ── */
async function downloadAll(){
  if(!files.length){ alert("No files"); return; }
  const zip=new JSZip();
  let format=document.getElementById("to").value;
  files.forEach(f=>{
    if(f.blob){
      let name=f.name.replace(/\.[^/.]+$/,"");
      zip.file(name+"."+format,f.blob);
    }
  });
  const content=await zip.generateAsync({type:"blob"});
  const now=new Date();
  const fileName=`Images_${now.getFullYear()}-${now.getMonth()+1}-${now.getDate()}_${now.getHours()}-${now.getMinutes()}-${now.getSeconds()}.zip`;
  const a=document.createElement("a");
  a.href=URL.createObjectURL(content);
  a.download=fileName;
  a.click();
}
</script>
